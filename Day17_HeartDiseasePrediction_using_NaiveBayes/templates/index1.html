<!doctype html>
<html>
  <head>
    <title>Heart Disease Predictor</title>
    <style>
      body {
        font-family: Arial;
        background: linear-gradient(to right, #36d1dc, #5b86e5);
        text-align: center;
      }

      .container {
        background: white;
        width: 45%;
        margin: 40px auto;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
      }

      h1 {
        color: #333;
      }

      label {
        display: block;
        margin-top: 10px;
        font-weight: bold;
        text-align: left;
      }

      input,
      select {
        width: 90%;
        padding: 10px;
        margin-top: 5px;
        border-radius: 8px;
        border: 1px solid #ccc;
      }

      button {
        margin-top: 20px;
        background: #5b86e5;
        color: white;
        padding: 12px 20px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
      }

      button:hover {
        background: #3f6ed3;
      }

      .result {
        margin-top: 20px;
        font-size: 18px;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>❤️ Heart Disease Predictor</h1>

      <form action="/predict" method="post">
        <label>Age</label>
        <input type="number" name="Age" required />

        <label>Sex</label>
        <select name="Sex">
          <option value="1">Male</option>
          <option value="0">Female</option>
        </select>

        <label>Chest Pain Type</label>
        <select name="ChestPainType">
          <option value="0">Typical Angina</option>
          <option value="1">Atypical Angina</option>
          <option value="2">Non-anginal Pain</option>
          <option value="3">Asymptomatic</option>
        </select>

        <label>Resting Blood Pressure</label>
        <input type="number" name="RestingBP" required />

        <label>Cholesterol</label>
        <input type="number" name="Cholesterol" required />

        <label>Fasting Blood Sugar</label>
        <select name="FastingBS">
          <option value="1">> 120 mg/dl</option>
          <option value="0">≤ 120 mg/dl</option>
        </select>

        <label>Resting ECG</label>
        <select name="RestingECG">
          <option value="0">Normal</option>
          <option value="1">ST-T abnormality</option>
          <option value="2">Left ventricular hypertrophy</option>
        </select>

        <label>Maximum Heart Rate</label>
        <input type="number" name="MaxHR" required />

        <label>Exercise Induced Angina</label>
        <select name="ExerciseAngina">
          <option value="1">Yes</option>
          <option value="0">No</option>
        </select>

        <label>Oldpeak</label>
        <input type="number" step="any" name="Oldpeak" required />

        <label>ST Slope</label>
        <select name="ST_Slope">
          <option value="0">Upsloping</option>
          <option value="1">Flat</option>
          <option value="2">Downsloping</option>
        </select>

        <button type="submit">Predict</button>
      </form>

      {% if prediction_text %}
      <div class="result">{{ prediction_text }}</div>
      {% endif %}
    </div>
  </body>
</html>
